<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Portfolio | Creative Developer</title>
    <meta name="description" content="Portfolio showcasing premium web designs and interactive experiences." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
</head>

<body>
    <div id="app">
        <nav id="navbar" class="glass">
            <div class="logo">PORTFOLIO</div>
            <ul class="nav-links">
                <li><a href="#hero">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>

        <main>
            <section id="hero" class="hero-section">
                <div class="hero-content">
                    <h1 class="reveal-text">Hello, I'm <span class="gradient-text">Raghav</span></h1>
                    <p class="hero-subtitle">Software Engineer | Java Developer </p>
                    <div class="hero-cta">
                        <a href="#projects" class="btn btn-primary">Check my work</a>
                        <a href="#contact" class="btn btn-secondary">Get in touch</a>
                    </div>
                </div>
                <div class="hero-visual">
                    <div class="glow-sphere"></div>
                </div>
            </section>

            <section id="about" class="section reveal">
                <div class="about-container">
                    <h2 class="section-title">About Me</h2>
                    <div class="about-content">
                        <p id="about-text" data-text="I'm a dedicated Software Engineer with a strong focus on backend development and system architecture. Specializing in Java, I build robust, scalable, and high-performance applications that solve complex business problems. I thrive on optimizing processes and writing clean, maintainable code." style="margin-bottom: 1.5rem; font-size: 1.1rem; min-height: 150px;">
                        </p>
                        <div class="skills-tags" id="about-skills" style="opacity: 0;">
                            <span>Java,</span><span>Spring Boot,</span><span>SQL,</span><span>REST APIs,</span><span>Git</span>
                        </div>
                    </div>
                </div>
            </section>

            <section id="contact" class="section reveal">
                <h2 class="section-title">Get In Touch</h2>
                <div class="contact-card glass">
                    <form id="contact-form">
                        <input type="text" placeholder="Name" required class="glass-input">
                        <input type="email" placeholder="Email" required class="glass-input">
                        <textarea placeholder="Message" rows="5" required class="glass-input"></textarea>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
            </section>
        </main>

        <footer class="glass reveal">
            <p>&copy; 2026 Portfolio. All rights reserved.</p>
        </footer>
    </div>
    <script type="module" src="./src/main.js"></script>
</body>

</html>
